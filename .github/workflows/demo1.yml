name: Events Demo 1
on:
  pull_request:
    types:
      -opened,reopened,edited
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci
      - name: Build code
        run: npm run build
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  Deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy project
        run: echo "Deploying..."